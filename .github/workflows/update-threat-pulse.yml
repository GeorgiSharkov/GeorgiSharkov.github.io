name: Update Threat Pulse Data

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-kev-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Threat Pulse snapshot
        run: python scripts/update_threat_pulse_data.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add threat-pulse-data.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Threat Pulse data"
          git push
